 <style>

  }

  header h1,
  header p {

   transform: translateX(20px);

  }

  header {

   justify-content: center;

  }

  #content {

   padding: 0 1rem;
  }

  #f {
   margin-left: 3rem;
   font-family: 'Audiowide', cursive;
  }

  .cmp-card {
   box-sizing: border-box;
   border-radius: 20px;
   border: 1px solid #ffffff;
   width: 200px;
   height: 150px;
  }

  .cmp-cards-container {
   display: flex;
   gap: 1rem;
   flex-wrap: wrap;
  }
 </style>
</head>

 <header>
